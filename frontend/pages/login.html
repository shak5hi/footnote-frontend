<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootNote &mdash; Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:        #F0EAE0;
      --paper-dark:   #E3DAC9;
      --paper-deep:   #D4C9B4;
      --ink:          #181512;
      --ink-mid:      #3A3228;
      --ink-light:    #6B5E52;
      --ink-ghost:    #9C8E82;
      --red:          #7A1A1A;
      --white-warm:   #FAF7F2;

      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Jost', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: none !important;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 200;
      line-height: 1.95;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Custom Cursor */
    .cursor-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--ink);
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .cursor-ring {
      width: 26px; height: 26px;
      border: 1px solid var(--ink-mid);
      border-radius: 50%;
      position: fixed;
      z-index: 9998;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
      opacity: 0.3;
    }

    .cursor-ring.hovered {
      width: 44px; height: 44px;
      opacity: 0.1;
    }

    @media (pointer: coarse) {
      * { cursor: auto !important; }
      .cursor-dot, .cursor-ring { display: none !important; }
    }

    a, button, input { color: inherit; font-family: inherit; }
    a { text-decoration: none; position: relative; }
    button { background: none; border: none; outline: none; }

    /* Nav */
    .nav {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px;
      background-color: var(--paper);
      border-bottom: 1px solid var(--paper-deep);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 48px;
      z-index: 100;
    }
    .nav-logo { font-size: 11px; font-weight: 200; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink); }

    /* Layout */
    .split {
      display: flex;
      width: 100%;
      height: 100%;
      padding-top: 56px;
    }
    
    .left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      background-color: var(--paper-dark);
      border-left: 1px solid var(--paper-deep);
    }

    /* Typography */
    .heading {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(48px, 6vw, 72px);
      line-height: 1.1;
      color: var(--ink);
    }
    .heading .italic { font-style: italic; }

    /* Form */
    .form-container {
      width: 100%;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 40px;
      position: relative;
    }
    .form-label {
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-ghost);
      display: block;
      margin-bottom: 12px;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--paper-deep);
      padding: 8px 0;
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 13px;
      color: var(--ink-mid);
      outline: none;
      transition: border-bottom-color 0.3s;
    }
    .form-input:focus {
      border-bottom-color: var(--ink);
    }
    .form-input::placeholder {
      color: var(--ink-ghost);
      opacity: 0.5;
    }
    
    .btn-solid {
      width: 100%;
      background-color: var(--ink);
      color: var(--white-warm);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 16px 0;
      margin-top: 24px;
      text-align: center;
      transition: background-color 0.3s;
    }
    .btn-solid:hover {
      background-color: var(--ink-mid);
    }

    .form-footer {
      margin-top: 48px;
      text-align: center;
    }
    .form-link {
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 11px;
      color: var(--ink-light);
      transition: color 0.3s;
    }
    .form-link::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 100%; height: 1px; background-color: var(--ink-light);
      transform: scaleX(0); transition: transform 0.3s; transform-origin: left;
    }
    .form-link:hover { color: var(--ink); }
    .form-link:hover::after { transform: scaleX(1); }

    /* Animations */
    .reveal-item {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .load-stagger {
      transform: translateY(16px);
      transition-duration: 1.1s;
    }
    .reveal-item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .split { flex-direction: column; height: auto; }
      .left { padding: 80px 24px; min-height: 40vh; }
      .right { padding: 80px 24px; min-height: 60vh; border-left: none; border-top: 1px solid var(--paper-deep); }
      .nav { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo has-hover">FOOTNOTE</a>
  </nav>

  <div class="split">
    <div class="left">
      <h1 class="heading reveal-item load-stagger">
        Welcome <span class="italic">back.</span>
      </h1>
    </div>
    <div class="right">
      <div class="form-container reveal-item load-stagger" style="transition-delay: 0.2s;">
        <div class="form-group">
          <label class="form-label">EMAIL ADDRESS</label>
          <input type="email" class="form-input has-hover" placeholder="reader@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" class="form-input has-hover" placeholder="Enter your password">
        </div>
        
        <button class="btn-solid has-hover">ENTER</button>

        <div class="form-footer">
          <a href="signup.html" class="form-link has-hover">Create an account instead</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const dot = document.querySelector('.cursor-dot');
    const ring = document.querySelector('.cursor-ring');

    document.addEventListener('mousemove', (e) => {
      dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
      ring.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    document.querySelectorAll('.has-hover, a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hovered'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hovered'));
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.load-stagger').forEach(el => el.classList.add('is-visible'));
      }, 50);
    });
  </script>
</body>
</html>
