<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootNote - Login / Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;1,300;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>
  <div class="split-layout">
    <!-- LEFT PANEL -->
    <div class="panel-left">
      <a href="./index.html" class="brand">FOOTNOTE</a>
      <div class="overlay"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel-right">
      <div class="form-container">

        <!-- HEADER TOGGLE -->
        <div class="form-header">
          <button id="toggle-login" class="toggle-btn active">Log in</button>
          <span class="toggle-separator">/</span>
          <button id="toggle-register" class="toggle-btn">Register</button>
          <div class="header-line"></div>
        </div>

        <!-- FORMS WRAPPER -->
        <div class="forms-wrapper">

          <!-- LOGIN FORM -->
          <form id="form-login" class="auth-form active">
            <div class="input-group onload-up">
              <input type="text" id="login-username" placeholder="Username or email" required>
            </div>
            <div class="input-group onload-up delay-1">
              <input type="password" id="login-password" placeholder="Password" required>
              <button type="button" class="toggle-password" tabindex="-1">Show</button>
            </div>
            <div class="form-options onload-up delay-2">
              <label class="remember-me">
                <input type="checkbox">
                <span class="checkmark"></span>
                Remember me
              </label>
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <p id="login-message" style="text-align: center; margin-bottom: 15px; font-size: 0.9em;"></p>
            <button type="submit" class="auth-btn onload-up delay-3">Log in</button>
          </form>

          <!-- REGISTER FORM -->
          <form id="form-register" class="auth-form">
            <div class="input-row onload-up">
              <div class="input-group">
                <input type="text" id="reg-fname" placeholder="First name" required>
              </div>
              <div class="input-group">
                <input type="text" id="reg-lname" placeholder="Last name" required>
              </div>
            </div>
            <div class="input-group onload-up delay-1">
              <input type="email" id="reg-email" placeholder="Email" required>
            </div>
            <div class="input-group onload-up delay-2">
              <input type="password" id="reg-password" placeholder="Password" required>
              <button type="button" class="toggle-password" tabindex="-1">Show</button>
            </div>
            <p class="privacy-text onload-up delay-3">
              Your personal data will be used to support your experience, manage access to your account, and for other
              purposes described in our privacy policy.
            </p>
            <button type="submit" class="auth-btn onload-up delay-4">Register</button>
          </form>

        </div>
      </div>
    </div>
  </div>
  <script src="./js/login.js"></script>
</body>

</html>
